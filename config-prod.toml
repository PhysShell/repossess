# CI config — safe to commit. Sensitive values injected at runtime via
# envsubst from GitHub Secrets (see .github/workflows/repossess-daily.yml).
# Never put real credentials or personal identifiers here.

[browser]
chromium_bin = "/placeholder"   # overridden by CHROMIUM_BIN env var set in workflow
user_data_dir = ".state-work/profile"
headless = true

[seed]
login_url = "https://chatgpt.com/auth/login"

[canary]
url = "https://chatgpt.com/backend-api/me"
expected_status = 200
field = "/id"
expected_value = "${REPOSSESS_CANARY_EXPECTED_VALUE}"

[crypto]
recipient_file = "age-recipient.txt"
verify_pubkey_file = "sign-pubkey.hex"

[lock]
ttl_seconds = 1800

[[stores]]
kind = "s3"
name = "agent-browser-state"
endpoint = "${REPOSSESS_R2_ENDPOINT}"
region = "auto"
bucket = "${REPOSSESS_R2_BUCKET}"
prefix = "state/"
access_key_env = "REPOSSESS_R2_ACCESS_KEY"
secret_key_env = "REPOSSESS_R2_SECRET_KEY"
