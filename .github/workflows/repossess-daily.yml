name: Repossess daily

on:
  workflow_dispatch:
  schedule:
    # 02:17 UTC + per-run jitter inside the job.
    - cron: "17 2 * * *"

concurrency:
  group: repossess-daily
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # reserved for future OIDC → AWS / cloud broker

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: repossess-prod
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable
          echo "CHROMIUM_BIN=$(which google-chrome-stable)" >> "$GITHUB_ENV"

      - name: Write config
        env:
          REPOSSESS_R2_ENDPOINT:           ${{ secrets.REPOSSESS_R2_ENDPOINT }}
          REPOSSESS_R2_BUCKET:             ${{ secrets.REPOSSESS_R2_BUCKET }}
          REPOSSESS_CANARY_EXPECTED_VALUE: ${{ secrets.REPOSSESS_CANARY_EXPECTED_VALUE }}
        run: envsubst < config-prod.toml > config.toml


      - name: Run repossess
        env:
          REPOSSESS_AGE_IDENTITY:  ${{ secrets.REPOSSESS_AGE_IDENTITY }}
          REPOSSESS_SIGN_SECRET:   ${{ secrets.REPOSSESS_SIGN_SECRET }}
          REPOSSESS_R2_ACCESS_KEY: ${{ secrets.REPOSSESS_R2_ACCESS_KEY }}
          REPOSSESS_R2_SECRET_KEY: ${{ secrets.REPOSSESS_R2_SECRET_KEY }}
          REPOSSESS_R2_ENDPOINT:   ${{ secrets.REPOSSESS_R2_ENDPOINT }}
          REPOSSESS_R2_BUCKET:     ${{ secrets.REPOSSESS_R2_BUCKET }}
          RUST_LOG: repossess=info
        run: |
          set +x
          nix run .#repossess -- run
