# Copy to config.toml and fill in. Never commit config.toml.
#
# Env-var conventions (see README "Env vars in config.toml" for the long form):
#   - Fields ending in `_env` (access_key_env, secret_key_env, token_env)
#     hold the NAME of an env var. The program reads the actual secret
#     from that variable at startup. Used for credentials only.
#   - All other fields (endpoint, region, bucket, prefix, repo, ...) are
#     LITERAL strings. They go into config.toml as-is.
#   - `${VAR}` syntax is NOT expanded anywhere. If you need a non-secret
#     value externalised, the field needs a dedicated `_env` variant.
#
# TODO: direnv or regular env at least:
#export REPOSSESS_AGE_IDENTITY=$(cat .secrets/age-key.txt)
#export REPOSSESS_SIGN_SECRET=$(cat .secrets/sign-secret.hex)
#export REPOSSESS_R2_ACCESS_KEY=<your key>
#export REPOSSESS_R2_SECRET_KEY=<your secret>
# Note: endpoint and bucket below are literals — not env vars.


[browser]
chromium_bin = "/run/current-system/sw/bin/chromium"
user_data_dir = ".state-work/profile"
headless = true

[seed]
# URL to land on for the interactive seed login.
login_url = "https://example.com/login"

[canary]
# An authenticated JSON endpoint that returns a stable identity field.
# Find it in DevTools → Network on the logged-in page (look for /api/me, /session, etc).
url = "https://example.com/api/me"
expected_status = 200
# JSON pointer (RFC 6901) to a stable field that uniquely identifies your account.
field = "/user/id"
expected_value = "REPLACE_WITH_YOUR_USER_ID"
# Optional. Defaults to a realistic desktop Chrome UA. Override if the target
# fingerprints a specific UA. A bare HTTP-client UA often gets 403/404.
# user_agent = "Mozilla/5.0 (...) Chrome/131.0.0.0 Safari/537.36"
# Optional extra request headers. `Accept: application/json, text/plain, */*`
# is sent by default; add Origin/Referer/etc here if the endpoint needs them.
# [canary.headers]
# Origin = "https://example.com"
# Referer = "https://example.com/"

[crypto]
recipient_file = "age-recipient.txt"
verify_pubkey_file = "sign-pubkey.hex"

[lock]
ttl_seconds = 1800

# First store is the canonical source of truth. The rest are append-only mirrors.
[[stores]]
kind = "s3"
name = "primary-r2"
endpoint = "https://<account>.r2.cloudflarestorage.com"
region = "auto"
bucket = "agent-state"
prefix = "state/"
access_key_env = "REPOSSESS_R2_ACCESS_KEY"
secret_key_env = "REPOSSESS_R2_SECRET_KEY"

[[stores]]
kind = "s3"
name = "mirror-b2"
endpoint = "https://s3.us-west-002.backblazeb2.com"
region = "us-west-002"
bucket = "agent-state-backup"
prefix = "state/"
access_key_env = "REPOSSESS_B2_ACCESS_KEY"
secret_key_env = "REPOSSESS_B2_SECRET_KEY"

[[stores]]
kind = "github_release"
name = "mirror-gh-release"
repo = "owner/agent-state"
token_env = "GITHUB_TOKEN"

# Optional zero-vendor-lock mirror: pushes snapshots to a dedicated branch of
# a git repo via --force-with-lease. Only needs a GITHUB_TOKEN (or any git
# server token); no R2/B2/AWS keys. Use a DEDICATED state branch — do not
# point this at the branch that contains application source code.
# [[stores]]
# kind = "git_branch"
# name = "mirror-git-branch"
# repo_url = "https://github.com/owner/agent-state.git"
# branch = "agent-state"
# token_env = "GITHUB_TOKEN"

# ── Workloads ────────────────────────────────────────────────────────────────
#
# Workloads are the daily jobs `run` performs after the session is restored
# and the canary passes. Uncomment a block to enable one. With no blocks,
# `run` is a pure session-refresh cycle.
#
# See the "Workloads: ChatGPT chats" section of README.md for the full
# explanation of what each knob does, the storage layout produced, and the
# `repossess import-chatgpt --from <dir>` bootstrap flow.

# [[workloads]]
# kind = "chatgpt_chats"
# name = "chats"
# prefix = "chatgpt/"                     # → chatgpt/index.json.age + chatgpt/conv/<id>.json.zst.age
#
# # URLs (override only if ChatGPT moves the API).
# # base_url = "https://chatgpt.com"
# # session_path = "/api/auth/session"
# # list_path = "/backend-api/conversations"
# # detail_path_template = "/backend-api/conversation/{id}"
#
# # Pagination + early-stop. After N consecutive list items already match our
# # index we stop paginating — that's the "caught up with last run" signal.
# # list_page_limit = 28
# # incremental_stop_after_known = 50
#
# # Rate limits — defaults track the JS exporter's `rate_limit.js`. For
# # incremental daily runs (few new chats) the batch cooldown and retry sweep
# # rarely fire; they exist for the import + first-run-after-long-pause cases.
# # list_delay_ms = 1200
# # detail_delay_ms = 4000
# # detail_batch_size = 75
# # detail_batch_cooldown_ms = 45000
# # retry_sweep_cooldown_ms = 600000
# # max_backoff_ms = 900000
# # max_retries = 5
#
# # zstd compression level for per-conversation bodies. 19 is the boundary
# # above which long-distance matching kicks in by default.
# # zstd_level = 19